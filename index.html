<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game - Human vs AI / AI vs AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>♔ Chess Game ♚</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="gameMode">Game Mode:</label>
                <select id="gameMode">
                    <option value="human-vs-ai">Human vs AI</option>
                    <option value="ai-vs-ai">AI vs AI</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="playerColor">Play as:</label>
                <select id="playerColor">
                    <option value="white">White</option>
                    <option value="black">Black</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="aiDifficulty">AI Difficulty:</label>
                <select id="aiDifficulty">
                    <option value="1">Easy</option>
                    <option value="2" selected>Medium</option>
                    <option value="3">Hard</option>
                </select>
            </div>
        </div>
        
        <div class="buttons">
            <button id="newGameBtn">New Game</button>
            <button id="undoBtn">Undo Move</button>
            <button id="flipBoardBtn">Flip Board</button>
        </div>
        
        <div class="game-info">
            <div id="status">Status: White's turn</div>
            <div id="moveHistory">Moves: </div>
        </div>
        
        <div class="board-container">
            <div id="chessboard"></div>
        </div>
        
        <div class="captured-pieces">
            <div class="captured-white">
                <span>Captured by Black:</span>
                <div id="capturedWhite"></div>
            </div>
            <div class="captured-black">
                <span>Captured by White:</span>
                <div id="capturedBlack"></div>
            </div>
        </div>
    </div>
    
    <script src="chess.js"></script>
    <script src="ai.js"></script>
    <script src="game.js"></script>
</body>
</html>
